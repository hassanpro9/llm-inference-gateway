# Used by docker-compose for local development (no Kubernetes).
# For Kubernetes, the kube-prometheus-stack uses pod annotations to auto-discover targets.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "llm-gateway"
    static_configs:
      - targets: ["api:8000"]
    metrics_path: /metrics
